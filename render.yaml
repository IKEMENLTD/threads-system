# Render自動デプロイ設定
services:
  - type: web
    name: threads-backend
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: threads-db
          property: connectionString
    autoDeploy: true # GitHubプッシュで自動デプロイ

databases:
  - name: threads-db
    region: singapore
    plan: free
    databaseName: threads_system
    user: threadsuser